<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>100m Tile Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link 
    rel="stylesheet" 
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.8);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>
  <div id="status">Waiting for GPS…</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    //----------------------------------------------------------
    // Load visited tiles from localStorage
    //----------------------------------------------------------
    const visitedTiles = new Set(JSON.parse(localStorage.getItem("visitedTiles") || "[]"));

    //----------------------------------------------------------
    // Tile conversion helpers (100m squares)
    //----------------------------------------------------------
    const TILE_SIZE_M = 100;
    const DEG_PER_M_LAT = 1 / 111320;

    function lonDegPerMeter(lat) {
      return 1 / (111320 * Math.cos(lat * Math.PI / 180));
    }

    function getTileId(lat, lon) {
      const latSize = TILE_SIZE_M * DEG_PER_M_LAT;
      const lonSize = TILE_SIZE_M * lonDegPerMeter(lat);

      const tileX = Math.floor(lon / lonSize);
      const tileY = Math.floor(lat / latSize);
      return { tileX, tileY, latSize, lonSize };
    }

    //----------------------------------------------------------
    // Leaflet map
    //----------------------------------------------------------
    const map = L.map('map').setView([52.0, -3.0], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19
    }).addTo(map);

    let userMarker = null;

    //----------------------------------------------------------
    // Draw visited tile on the map
    //----------------------------------------------------------
    function drawTile(tX, tY, latSize, lonSize) {
      const minLat = tY * latSize;
      const maxLat = minLat + latSize;
      const minLon = tX * lonSize;
      const maxLon = minLon + lonSize;

      L.rectangle([[minLat, minLon], [maxLat, maxLon]], {
        color: "green",
        weight: 1,
        fillOpacity: 0.3
      }).addTo(map);
    }

    // Draw all previously visited tiles
    for (const id of visitedTiles) {
      const [x, y, latSize, lonSize] = id.split("_").map(Number);
      drawTile(x, y, latSize, lonSize);
    }

    //----------------------------------------------------------
    // GPS tracking
    //----------------------------------------------------------
    function updatePosition(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("status").innerText =
        `Lat: ${lat.toFixed(5)}, Lon: ${lon.toFixed(5)}`;

      if (!userMarker) {
        userMarker = L.marker([lat, lon]).addTo(map);
        map.setView([lat, lon], 16);
      } else {
        userMarker.setLatLng([lat, lon]);
      }

      const { tileX, tileY, latSize, lonSize } = getTileId(lat, lon);
      const tileKey = `${tileX}_${tileY}_${latSize}_${lonSize}`;

      if (!visitedTiles.has(tileKey)) {
        visitedTiles.add(tileKey);
        localStorage.setItem("visitedTiles", JSON.stringify([...visitedTiles]));
        drawTile(tileX, tileY, latSize, lonSize);
      }
    }

    navigator.geolocation.watchPosition(
      updatePosition,
      err => console.error(err),
      { enableHighAccuracy: true, maximumAge: 1000 }
    );
  </script>
</body>
</html>
