<DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>100m Tile Tracker – PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- ✅ iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    #topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-family: sans-serif;
      display: flex;
      gap: 20px;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    #resetBtn {
      padding: 6px 10px;
      background: #ff5c5c;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <span id="gpsStatus">GPS: waiting…</span>
    <span id="tileCount">Tiles: 0</span>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ✅ Register service worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <script>
    /* ------------------ CONSTANTS ------------------ */
    const TILE_SIZE_M = 100;
    const DEG_PER_M_LAT = 1 / 111320;

    /* ------------------ SAFE STORAGE ------------------ */
    let visitedTiles = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem("visitedTiles") || "[]");
      if (Array.isArray(raw)) {
        raw.forEach(k => {
          if (typeof k === "string" && k.includes("_")) visitedTiles.add(k);
        });
      }
    } catch (e) { localStorage.removeItem("visitedTiles"); }

    document.getElementById("tileCount").innerText =
      "Tiles: " + visitedTiles.size;

    /* ------------------ TILE MATH (Option 2) ------------------ */
    function computeTile(lat, lon) {
      const latSize = TILE_SIZE_M * DEG_PER_M_LAT;
      const lonSize = TILE_SIZE_M * (1 / (111320 * Math.cos(lat * Math.PI / 180)));

      const tileX = Math.floor(lon / lonSize);
      const tileY = Math.floor(lat / latSize);

      return { tileX, tileY, latSize, lonSize };
    }

    /* ------------------ MAP ------------------ */
    const map = L.map('map').setView([52.0, -3.0], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    let userMarker = null;
    let currentTileRect = null;

    function drawTile(tx, ty, latSize, lonSize, color="#00FF73", weight=2) {
      const minLat = ty * latSize;
      const maxLat = minLat + latSize;
      const minLon = tx * lonSize;
      const maxLon = minLon + lonSize;

      return L.rectangle([[minLat, minLon], [maxLat, maxLon]], {
        color,
        weight,
        fillOpacity: 0
      }).addTo(map);
    }

    /* Render stored tiles */
    visitedTiles.forEach(key => {
      const [x, y] = key.split("_").map(Number);
      const latSize = TILE_SIZE_M * DEG_PER_M_LAT;
      const lonSize = TILE_SIZE_M * (1 / (111320 * Math.cos((y * latSize) * Math.PI / 180)));
      drawTile(x, y, latSize, lonSize);
    });

    /* ------------------ GPS HANDLER ------------------ */
    function updatePosition(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("gpsStatus").innerText =
        `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

      if (!userMarker) {
        userMarker = L.marker([lat, lon]).addTo(map);
        map.setView([lat, lon], 16);
      } else {
        userMarker.setLatLng([lat, lon]);
      }

      const { tileX, tileY, latSize, lonSize } = computeTile(lat, lon);
      const key = `${tileX}_${tileY}`;

      /* Highlight current tile */
      if (currentTileRect) map.removeLayer(currentTileRect);
      currentTileRect = drawTile(tileX, tileY, latSize, lonSize, "#FFFF00", 3);

      /* Record visited tile */
      if (!visitedTiles.has(key)) {
        visitedTiles.add(key);
        localStorage.setItem("visitedTiles", JSON.stringify([...visitedTiles]));
        drawTile(tileX, tileY, latSize, lonSize);
        document.getElementById("tileCount").innerText =
          "Tiles: " + visitedTiles.size;
      }
    }

    function gpsError(err) {
      document.getElementById("gpsStatus").innerText =
        "GPS error: " + err.message;
    }

    navigator.geolocation.watchPosition(updatePosition, gpsError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    });

    /* ------------------ RESET ------------------ */
    document.getElementById("resetBtn").onclick = () => {
      if (confirm("Clear all visited tiles?")) {
        localStorage.removeItem("visitedTiles");
        location.reload();
      }
    };
  </script>

</body>
</html>
