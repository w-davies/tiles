<DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>100m Tile Tracker (Constant Tile Size)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; overflow: hidden; }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;

      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-family: sans-serif;

      display: flex;
      gap: 20px;
      align-items: center;

      backdrop-filter: blur(4px);
    }

    #topbar span {
      font-size: 14px;
    }

    #resetBtn {
      padding: 6px 10px;
      background: #ff5c5c;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    #resetBtn:hover {
      background: #ff3232;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <span id="gpsStatus">GPS: waiting…</span>
    <span id="tileCount">Tiles: 0</span>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* ---------------------------------------------------------
       CONSTANT TILE SIZE (Option 1)
       100m converted to degrees once and reused everywhere.
    --------------------------------------------------------- */
    const TILE_SIZE_M = 100;
    const DEG_PER_M = 1 / 111320;   // constant approximation
    const TILE_SIZE_DEG = TILE_SIZE_M * DEG_PER_M;

    /* ---------------------------------------------------------
       LOAD VISITED TILES SAFELY
    --------------------------------------------------------- */
    let visitedTiles = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem("visitedTiles") || "[]");
      if (Array.isArray(raw)) {
        for (const key of raw) {
          // valid key format: "x_y"
          const parts = key.split("_");
          if (parts.length === 2 && parts.every(n => !isNaN(Number(n)))) {
            visitedTiles.add(key);
          }
        }
      }
    } catch (err) {
      console.warn("Corrupted storage, clearing.");
      localStorage.removeItem("visitedTiles");
    }

    document.getElementById("tileCount").innerText =
      "Tiles: " + visitedTiles.size;

    /* ---------------------------------------------------------
       TILE COMPUTATION (constant tiles)
    --------------------------------------------------------- */
    function computeTile(lat, lon) {
      const tileX = Math.floor(lon / TILE_SIZE_DEG);
      const tileY = Math.floor(lat / TILE_SIZE_DEG);

      if (!isFinite(tileX) || !isFinite(tileY)) return null;

      return { tileX, tileY };
    }

    /* ---------------------------------------------------------
       LEAFLET MAP
    --------------------------------------------------------- */
    const map = L.map('map').setView([52.0, -3.0], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    let userMarker = null;

    /* ---------------------------------------------------------
       DRAW TILE OUTLINE
    --------------------------------------------------------- */
    function drawTile(tileX, tileY) {
      const minLat = tileY * TILE_SIZE_DEG;
      const maxLat = minLat + TILE_SIZE_DEG;
      const minLon = tileX * TILE_SIZE_DEG;
      const maxLon = minLon + TILE_SIZE_DEG;

      if (![minLat, maxLat, minLon, maxLon].every(isFinite)) return;

      L.rectangle([[minLat, minLon], [maxLat, maxLon]], {
        color: "#00FF73",
        weight: 2,
        fillOpacity: 0
      }).addTo(map);
    }

    // Draw existing tiles
    for (const key of visitedTiles) {
      const [x, y] = key.split("_").map(Number);
      drawTile(x, y);
    }

    /* ---------------------------------------------------------
       GPS UPDATE HANDLER
    --------------------------------------------------------- */
    function updatePosition(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("gpsStatus").innerText =
        `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

      if (!userMarker) {
        userMarker = L.marker([lat, lon]).addTo(map);
        map.setView([lat, lon], 16);
      } else {
        userMarker.setLatLng([lat, lon]);
      }

      const tile = computeTile(lat, lon);
      if (!tile) return;

      const key = `${tile.tileX}_${tile.tileY}`;

      if (!visitedTiles.has(key)) {
        visitedTiles.add(key);
        localStorage.setItem("visitedTiles", JSON.stringify([...visitedTiles]));
        drawTile(tile.tileX, tile.tileY);

        document.getElementById("tileCount").innerText =
          "Tiles: " + visitedTiles.size;
      }
    }

    function gpsError(err) {
      document.getElementById("gpsStatus").innerText =
        "GPS error: " + err.message;
      console.error(err);
    }

    navigator.geolocation.watchPosition(
      updatePosition,
      gpsError,
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );

    /* ---------------------------------------------------------
       RESET BUTTON
    --------------------------------------------------------- */
    document.getElementById("resetBtn").onclick = () => {
      if (!confirm("Clear all visited tiles?")) return;
      localStorage.removeItem("visitedTiles");
      visitedTiles.clear();
      location.reload();
    };
  </script>

</body>
</html>
