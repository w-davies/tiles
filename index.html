<DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>100m Tile Tracker (Fixed)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    body { margin: 0; overflow: hidden; }

    #map {
      width: 100vw;
      height: 100vh;
    }

    #topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;

      background: rgba(0,0,0,0.65);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-family: sans-serif;

      display: flex;
      gap: 20px;
      align-items: center;

      backdrop-filter: blur(4px);
    }

    #topbar span {
      font-size: 14px;
    }

    #resetBtn {
      padding: 6px 10px;
      background: #ff5c5c;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    #resetBtn:hover {
      background: #ff3232;
    }
  </style>
</head>

<body>

  <div id="topbar">
    <span id="gpsStatus">GPS: waiting…</span>
    <span id="tileCount">Tiles: 0</span>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin="">
  </script>

  <script>
    /* --------------------------------------------------------------------
       SAFE STORAGE LOADING (protects against corrupted tile entries)
    -------------------------------------------------------------------- */
    let visitedTiles = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem("visitedTiles") || "[]");
      if (Array.isArray(raw)) {
        for (const key of raw) {
          if (typeof key === "string" && key.split("_").length === 4) {
            visitedTiles.add(key);
          }
        }
      }
    } catch (err) {
      console.warn("Storage corrupted - clearing.");
      localStorage.removeItem("visitedTiles");
    }

    document.getElementById("tileCount").innerText = "Tiles: " + visitedTiles.size;

    /* --------------------------------------------------------------------
       TILE SIZE & MATH HELPERS (100m x 100m)
    -------------------------------------------------------------------- */
    const TILE_SIZE_M = 250;
    const DEG_PER_M_LAT = 1 / 111320;

    function lonDegPerMeter(lat) {
      const cosLat = Math.cos(lat * Math.PI / 180);
      if (cosLat === 0) return 0.00000000001; // avoid division by zero
      return 1 / (111320 * cosLat);
    }

    function getTile(lat, lon) {
      const latSize = TILE_SIZE_M * DEG_PER_M_LAT;
      const lonSize = TILE_SIZE_M * lonDegPerMeter(lat);

      if (!isFinite(latSize) || !isFinite(lonSize)) return null;

      const tileX = Math.floor(lon / lonSize);
      const tileY = Math.floor(lat / latSize);

      if (!isFinite(tileX) || !isFinite(tileY)) return null;

      return { tileX, tileY, latSize, lonSize };
    }

    /* --------------------------------------------------------------------
       MAP INITIALIZATION
    -------------------------------------------------------------------- */
    const map = L.map('map').setView([52.0, -3.0], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    let userMarker = null;

    /* --------------------------------------------------------------------
       SAFE TILE DRAWING WITH VALIDATION
    -------------------------------------------------------------------- */
    function drawTileOutline(x, y, latSize, lonSize) {
      if ([x,y,latSize,lonSize].some(v => !isFinite(v))) {
        console.warn("Skipping invalid tile:", {x,y,latSize,lonSize});
        return;
      }

      const minLat = y * latSize;
      const maxLat = minLat + latSize;
      const minLon = x * lonSize;
      const maxLon = minLon + lonSize;

      if (![minLat, maxLat, minLon, maxLon].every(isFinite)) return;

      L.rectangle([[minLat, minLon], [maxLat, maxLon]], {
        color: "#00FF73",
        weight: 2,
        fillOpacity: 0
      }).addTo(map);
    }

    /* Draw previously visited tiles */
    for (const key of visitedTiles) {
      const parts = key.split("_").map(Number);
      if (parts.length === 4 && parts.every(isFinite)) {
        drawTileOutline(parts[0], parts[1], parts[2], parts[3]);
      }
    }

    /* --------------------------------------------------------------------
       GPS UPDATE HANDLER (fully protected)
    -------------------------------------------------------------------- */
    function updatePosition(pos) {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      document.getElementById("gpsStatus").innerText =
        `GPS: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

      if (!userMarker) {
        userMarker = L.marker([lat, lon]).addTo(map);
        map.setView([lat, lon], 16);
      } else {
        userMarker.setLatLng([lat, lon]);
      }

      const tile = getTile(lat, lon);
      if (!tile) {
        console.warn("Invalid tile computed for:", lat, lon);
        return;
      }

      const { tileX, tileY, latSize, lonSize } = tile;
      const key = `${tileX}_${tileY}_${latSize}_${lonSize}`;

      if (!visitedTiles.has(key)) {
        visitedTiles.add(key);
        localStorage.setItem("visitedTiles", JSON.stringify([...visitedTiles]));
        drawTileOutline(tileX, tileY, latSize, lonSize);
        document.getElementById("tileCount").innerText =
          "Tiles: " + visitedTiles.size;
      }
    }

    function handleGpsError(err) {
      document.getElementById("gpsStatus").innerText =
        "GPS error: " + err.message;
      console.error("GPS error:", err);
    }

    navigator.geolocation.watchPosition(
      updatePosition,
      handleGpsError,
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );

    /* --------------------------------------------------------------------
       RESET BUTTON
    -------------------------------------------------------------------- */
    document.getElementById("resetBtn").onclick = () => {
      if (!confirm("Clear all visited tiles?")) return;
      localStorage.removeItem("visitedTiles");
      visitedTiles.clear();
      location.reload();
    };
  </script>

</body>
</html>
