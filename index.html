<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPS Debug Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      background: #111;
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      white-space: pre-wrap;
    }
    .section {
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #0f0;
      border-radius: 8px;
      background: #000;
    }
    .error {
      color: #ff4444;
    }
    .ok {
      color: #44ff44;
    }
  </style>
</head>

<body>

  <h1>📡 GPS DEBUG VIEW</h1>

  <div id="secure" class="section"></div>
  <div id="permission" class="section"></div>
  <div id="updates" class="section"></div>
  <div id="errors" class="section"></div>


<script>
/* -----------------------------------------------------------
   SECURE CONTEXT CHECK
----------------------------------------------------------- */
const secureEl = document.getElementById("secure");
secureEl.textContent = "Secure context: " + (window.isSecureContext ? "✅ YES" : "❌ NO");
secureEl.className = "section " + (window.isSecureContext ? "ok" : "error");

/* -----------------------------------------------------------
   PERMISSION CHECK
----------------------------------------------------------- */
const permEl = document.getElementById("permission");

async function checkPermissions() {
  if (!navigator.permissions) {
    permEl.textContent = "Permissions API: ❌ NOT SUPPORTED";
    permEl.className = "section error";
    return;
  }

  try {
    const result = await navigator.permissions.query({ name: "geolocation" });
    permEl.textContent = "Geolocation Permission: " + result.state.toUpperCase();

    if (result.state === "granted") permEl.className = "section ok";
    if (result.state === "prompt")  permEl.className = "section";
    if (result.state === "denied")  permEl.className = "section error";

    // Update when permission changes
    result.onchange = () => {
      permEl.textContent = "Geolocation Permission: " + result.state.toUpperCase();
    };

  } catch (e) {
    permEl.textContent = "Permissions API error: " + e;
    permEl.className = "section error";
  }
}

checkPermissions();

/* -----------------------------------------------------------
   GEOLOCATION DEBUG OUTPUT
----------------------------------------------------------- */
const updatesEl = document.getElementById("updates");
const errorsEl = document.getElementById("errors");

updatesEl.textContent = "Waiting for GPS updates...\n";

function updatePosition(pos) {
  const c = pos.coords;
  const t = new Date(pos.timestamp).toLocaleTimeString();

  updatesEl.textContent =
    "✅ GPS UPDATE at " + t + "\n\n" +
    "Latitude:  " + c.latitude + "\n" +
    "Longitude: " + c.longitude + "\n" +
    "Accuracy:  " + c.accuracy + "m\n" +
    "Altitude:  " + c.altitude + "\n" +
    "Heading:   " + c.heading + "\n" +
    "Speed:     " + c.speed + "\n" +
    "Timestamp: " + pos.timestamp + "\n";
}

function gpsError(err) {
  errorsEl.textContent =
    "❌ GPS ERROR\n" +
    "Code: " + err.code + "\n" +
    "Message: " + err.message;
  errorsEl.className = "section error";
}

// Start position watcher
navigator.geolocation.watchPosition(
  updatePosition,
  gpsError,
  {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 0
  }
);
</script>

</body>
</html>
